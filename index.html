<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLSM Calculator</title>
    <link rel="icon" href="images/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parentContainer">
        <h1>VLSM Calculator</h1>
        <div class="inputting">
            <div class="octets">

            </div>
            <h3>Enter the IP address and its subnet mask</h3>
            <label>1st Octet: </label>
            <input type="number" id="1stOctet" class="octet" max="255">
            <label>2nd Octet: </label>
            <input type="number" id="2ndOctet" class="octet" max="255">
            <label>3rd Octet: </label>
            <input type="number" id="3rdOctet" class="octet" max="255">
            <label>4th Octet: </label>
            <input type="number" id="4thOctet" class="octet" max="255"><br>
            <label>Subnet Mask: /</label>
            <input type="number" id="subnetMask">
            <label>Requred Host: </label>
            <input type="number" id="host"><br>
            
            <button id="submit">Submit</button>
            <button id="clear">Clear</button>
        </div>
    </div>
    <hr>
    <div class="result">
        <h3>Result:</h3>
        <p id="ipResult">IP Address:</p>
        <p id="hostResult">Host:</p>
        <p id="bits">Bits:</p>
        <p id="nsm">New Subnet Mask:</p>
        <p id="lsm">Long Subnet Mask:</p>
        <p id="inc">Increment:</p>
        <p id="1stRange">Range:</p>
        <p id="nextIP">Next IP:</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
